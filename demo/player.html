<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Player — Web Remote Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      color: #202124;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
    }

    .topbar {
      background: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #e8eaed;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
      flex-shrink: 0;
    }
    .topbar .logo { font-size: 18px; font-weight: 500; color: #1a73e8; letter-spacing: -0.3px; }
    .topbar .logo span { color: #5f6368; font-weight: 400; }
    .topbar .sep { flex: 1; }
    .topbar .session-name { font-size: 14px; color: #3c4043; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #5f6368;
    }
    .empty-state .icon { font-size: 56px; opacity: .6; }
    .empty-state h1 { font-size: 22px; font-weight: 500; color: #202124; }
    .empty-state p { font-size: 14px; color: #5f6368; max-width: 380px; text-align: center; line-height: 1.6; }
    .empty-state .btn {
      padding: 10px 28px; font-size: 14px; font-weight: 500; border: none;
      border-radius: 8px; cursor: pointer; background: #1a73e8; color: #fff;
      transition: background .15s;
    }
    .empty-state .btn:hover { background: #1765cc; }

    /* Toolbar (hidden until loaded) */
    .toolbar {
      display: none;
      background: #fff;
      padding: 8px 24px;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #e8eaed;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .toolbar.visible { display: flex; }
    .toolbar .group { display: flex; align-items: center; gap: 6px; }
    .toolbar .label { font-size: 11px; color: #5f6368; text-transform: uppercase; letter-spacing: .5px; }
    .toolbar .btn {
      padding: 6px 14px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .toolbar .btn:disabled { opacity: .45; cursor: default; }
    .btn-play { background: #1a73e8; color: #fff; }
    .btn-play:hover:not(:disabled) { background: #1765cc; }
    .btn-outline { background: #fff; color: #1a73e8; border: 1px solid #dadce0; }
    .btn-outline:hover:not(:disabled) { background: #f1f3f4; }
    .toolbar select {
      padding: 5px 24px 5px 8px; border: 1px solid #dadce0;
      border-radius: 6px; font-size: 12px; background: #fff; appearance: none;
    }
    .toolbar input[type="range"] { flex: 1; min-width: 120px; accent-color: #1a73e8; }
    .toolbar .time { font-family: 'Roboto Mono', monospace; font-size: 12px; color: #3c4043; min-width: 110px; text-align: center; }
    .toolbar .frame-label { font-size: 11px; color: #5f6368; min-width: 90px; }

    /* Viewer */
    .viewer-wrap {
      flex: 1;
      display: none;
      background: #e8eaed;
      margin: 12px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .viewer-wrap.visible { display: block; }
    .viewer-wrap iframe { width: 100%; height: 100%; border: none; background: #fff; }

    /* Footer */
    .footer {
      display: none;
      background: #fff;
      padding: 0 24px; height: 36px;
      align-items: center; justify-content: space-between;
      border-top: 1px solid #e8eaed;
      font-size: 11px; color: #5f6368;
      flex-shrink: 0;
    }
    .footer.visible { display: flex; }
  </style>
</head>
<body>

  <div class="topbar" id="topbar">
    <span class="logo">Remote<span>Agent</span></span>
    <span style="color:#dadce0;">|</span>
    <span class="session-name" id="sessionName">Player</span>
    <span class="sep"></span>
    <button class="btn-outline" id="loadBtnSm" style="padding:6px 14px;font-size:12px;">📂 Load</button>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <span class="icon">🎬</span>
    <h1>Session Player</h1>
    <p>Load a <code>.json</code> recording exported from the admin viewer to replay the student's screen at any speed. No live connection needed — works fully offline.</p>
    <button class="btn" id="loadBtn">📂 Load Recording</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="group">
      <span class="label">Playback</span>
      <button class="btn btn-play" id="playBtn">▶ Play</button>
      <button class="btn btn-outline" id="pauseBtn">⏸ Pause</button>
      <button class="btn btn-outline" id="stopBtn">⏹ Stop</button>
    </div>
    <div class="group">
      <span class="label">Speed</span>
      <select id="speedSelect">
        <option value="0.25">0.25x</option>
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="2">2x</option>
        <option value="4">4x</option>
      </select>
    </div>
    <div class="group" style="flex:1;min-width:120px;">
      <input type="range" id="seekBar" min="0" max="100" value="0" style="width:100%">
    </div>
    <span class="time" id="timeDisplay">00:00 / 00:00</span>
    <span class="frame-label" id="frameLabel"></span>
  </div>

  <!-- Viewer -->
  <div class="viewer-wrap" id="viewerWrap"></div>

  <!-- Footer -->
  <div class="footer" id="footer">
    <span id="footerLeft"></span>
    <span id="footerRight">Ready</span>
  </div>

  <script type="module">
    import { DOMReconstructor, SessionRecorder, SessionPlayer } from '../src/index.js';

    const emptyState = document.getElementById('emptyState');
    const toolbar = document.getElementById('toolbar');
    const viewerWrap = document.getElementById('viewerWrap');
    const footer = document.getElementById('footer');
    const sessionName = document.getElementById('sessionName');
    const loadBtn = document.getElementById('loadBtn');
    const loadBtnSm = document.getElementById('loadBtnSm');
    const fileInput = document.getElementById('fileInput');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const speedSelect = document.getElementById('speedSelect');
    const seekBar = document.getElementById('seekBar');
    const timeDisplay = document.getElementById('timeDisplay');
    const frameLabel = document.getElementById('frameLabel');
    const footerLeft = document.getElementById('footerLeft');
    const footerRight = document.getElementById('footerRight');

    let reconstructor = null;
    let recorder = new SessionRecorder();
    let player = null;
    let seekBarDragging = false;

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }

    function showPlayer() {
      emptyState.style.display = 'none';
      toolbar.classList.add('visible');
      viewerWrap.classList.add('visible');
      footer.classList.add('visible');
    }

    function ensureReconstructor() {
      if (reconstructor) return reconstructor;
      const old = viewerWrap.querySelector('iframe');
      if (old) old.remove();
      const iframe = document.createElement('iframe');
      iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts');
      iframe.style.cssText = 'width:100%;height:100%;border:none;background:#fff;';
      viewerWrap.appendChild(iframe);
      reconstructor = new DOMReconstructor(iframe, { allowScripts: true });
      return reconstructor;
    }

    function loadRecording(file) {
      return recorder.loadFromFile(file).then(() => {
        ensureReconstructor();
        player = new SessionPlayer(reconstructor, {
          onTick: (info) => {
            if (!seekBarDragging) {
              seekBar.value = info.elapsed;
              timeDisplay.textContent = `${formatTime(info.elapsed)} / ${formatTime(info.duration)}`;
            }
            footerRight.textContent = info.state === 'playing'
              ? `▶ Playing ${player.speed}x`
              : info.state === 'paused' ? '⏸ Paused' : '⏹ Stopped';
          },
          onEnd: () => {
            playBtn.disabled = false; pauseBtn.disabled = true;
            footerRight.textContent = '⏹ Ended';
          },
          onStateChange: (info) => {
            footerRight.textContent = info.state === 'playing'
              ? `▶ Playing ${info.speed}x`
              : info.state === 'paused' ? '⏸ Paused' : '⏹ Stopped';
          },
        });

        player.load(recorder.export());

        const dur = recorder.duration;
        seekBar.max = dur;
        seekBar.value = 0;
        timeDisplay.textContent = `00:00 / ${formatTime(dur)}`;
        frameLabel.textContent = `${recorder.frameCount} frames`;
        footerLeft.textContent = `Session: ${recorder._sessionId || '—'}`;
        sessionName.textContent = recorder._sessionId || 'Imported Recording';

        showPlayer();
        playBtn.disabled = false;
        pauseBtn.disabled = true;
        stopBtn.disabled = true;
        footerRight.textContent = '📼 Loaded — press Play';
        player.seek(0);
      });
    }

    loadBtn.addEventListener('click', () => fileInput.click());
    loadBtnSm.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      try { await loadRecording(file); } catch (err) { alert('Failed: ' + err.message); }
      fileInput.value = '';
    });

    playBtn.addEventListener('click', () => {
      if (!player) return;
      player.play(parseFloat(speedSelect.value));
      playBtn.disabled = true; pauseBtn.disabled = false; stopBtn.disabled = false;
    });
    pauseBtn.addEventListener('click', () => {
      player?.pause(); playBtn.disabled = false; pauseBtn.disabled = true;
    });
    stopBtn.addEventListener('click', () => {
      player?.stop();
      playBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
      seekBar.value = 0;
      timeDisplay.textContent = `00:00 / ${formatTime(player.duration)}`;
      footerRight.textContent = '⏹ Stopped';
    });
    speedSelect.addEventListener('change', () => {
      player?.setSpeed(parseFloat(speedSelect.value));
    });
    seekBar.addEventListener('mousedown', () => { seekBarDragging = true; });
    seekBar.addEventListener('input', () => {
      if (!player?.hasRecording) return;
      timeDisplay.textContent = `${formatTime(parseFloat(seekBar.value))} / ${formatTime(player.duration)}`;
    });
    seekBar.addEventListener('change', () => {
      if (!player) return;
      player.seek(parseFloat(seekBar.value));
      seekBarDragging = false;
    });
    seekBar.addEventListener('mouseup', () => {
      if (player?.hasRecording) seekBar.dispatchEvent(new Event('change'));
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (!player?.hasRecording) return;
      switch (e.code) {
        case 'Space': e.preventDefault(); (player.state==='playing'?pauseBtn:playBtn).click(); break;
        case 'ArrowLeft': e.preventDefault(); player.seek(Math.max(0,player.currentTime-1000)); seekBar.value=player.currentTime; break;
        case 'ArrowRight': e.preventDefault(); player.seek(Math.min(player.duration,player.currentTime+1000)); seekBar.value=player.currentTime; break;
      }
    });

    // Drag & drop
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', async e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file?.name.endsWith('.json')) {
        try { await loadRecording(file); } catch (err) { alert('Failed: ' + err.message); }
      }
    });
  </script>
</body>
</html>
